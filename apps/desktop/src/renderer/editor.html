<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>shotr — editor</title>
    <style>
      :root { color-scheme: light dark; }
      body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background: #0b1220; color: #e2e8f0; display: flex; flex-direction: column; height: 100vh; }
      #toolbar { display: flex; gap: 6px; align-items: center; padding: 8px 10px; background: #111a2e; border-bottom: 1px solid #1f2a44; flex-wrap: wrap; }
      #toolbar button { padding: 7px 10px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; cursor: pointer; font-size: 13px; transition: background .1s ease, transform .06s ease, border-color .1s ease; -webkit-user-select: none; min-width: 44px; }
      #toolbar button:hover { background: #273449; border-color: #475569; }
      #toolbar button:active { transform: scale(0.92); }
      #toolbar button.active { background: #2563eb; border-color: #2563eb; }
      #toolbar button.clicked { background: #1d4ed8; border-color: #3b82f6; }
      #toolbar button.flash { background: #16a34a; border-color: #16a34a; color: #fff; }
      #toolbar button:focus-visible { outline: 2px solid #38bdf8; outline-offset: 2px; }
      #toolbar .sep { width: 1px; height: 22px; background: #334155; margin: 0 4px; }
      #toolbar input[type="color"] { width: 30px; height: 30px; padding: 0; border: none; background: none; }
      #stage { flex: 1; overflow: auto; display: grid; place-items: center; padding: 18px; }
      canvas { box-shadow: 0 10px 40px rgba(0,0,0,.5); border-radius: 6px; }
      .grow { flex: 1; }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button data-tool="select" class="active">Select</button>
      <button data-tool="pencil">Pencil</button>
      <button data-tool="text">Text</button>
      <button data-tool="rect">Rect</button>
      <button data-tool="ellipse">Ellipse</button>
      <button data-tool="arrow">Arrow</button>
      <button data-tool="line">Line</button>
      <span class="sep"></span>
      <input type="color" id="color" value="#ef4444" title="Color" />
      <label>Size <input type="range" id="size" min="1" max="40" value="4" /></label>
      <span class="sep"></span>
      <button id="undo">Undo</button>
      <button id="redo">Redo</button>
      <button id="delete">Delete</button>
      <span class="grow"></span>
      <button id="copy">Copy</button>
      <button id="save">Save</button>
    </div>
    <div id="stage"><canvas id="canvas"></canvas></div>
    <script type="module" src="./editor.ts"></script>
  </body>
</html>
